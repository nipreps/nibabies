name: Pre-release Tests

on:
  schedule:
    - cron: '0 0 * * 2'  # Weekly on Tuesday at midnight UTC
  workflow_dispatch:

defaults:
  run:
    shell: bash

env:
  FORCE_COLOR: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.12', '3.13', '3.14' ]
        dependencies: [ 'pre' ]

    env:
      DEPENDS: ${{ matrix.dependencies }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0
    - uses: actions/cache@v5
      with:
        path: ~/.cache/templateflow
        key: templateflow-v1
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y --no-install-recommends graphviz
    - name: Set up Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.python-version }}
    - name: Display Python version
      run: uv run python --version
    - name: Install tox
      run: |
        uv tool install --with=tox-uv --with=tox-gh-actions tox
    - name: Show tox config
      run: tox c
    - name: Run tox
      run: tox -v --exit-and-dump-after 1200
    - name: Minimize uv cache
      run: uv cache prune --ci
      if: ${{ always() }}
    - uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
      if: ${{ always() }}

  notify:
    runs-on: ubuntu-latest
    needs: [test]
    if: failure() && github.event_name == 'schedule'
    steps:
      - name: Create issue on failure
        run: |
          gh issue create \
            --title "Weekly Pre-release Tests Failed" \
            --body "The weekly pre-release tests have failed. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
